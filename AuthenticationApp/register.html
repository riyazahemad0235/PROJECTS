<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="register.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Faster+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <link rel="icon" href="appLogo.png">

<body>
    <div class="mainContainer">
        <div class="displayContainer">
            <div class="headerContainer">
                <div class="firstSec">
                    <i class="fa-solid fa-circle-user" id="userImg"></i>
                </div>
                <div class="secondSec">
                    <h1 class="firstTitle">Welcome Back</h1>
                    <h4 class="secondTitle">Please enter your details</h4>
                </div>
            </div>
            <div class="loginContainer">
                <div class="nameSection">
                    <h4 id="name">Full name</h4>
                    <div class="name-wrapper">
                        <i class="fa-regular fa-circle-user"></i>
                        <input class="name" type="text" placeholder="Enter your Full name">
                    </div>
                </div>
                <div class="emailSection">
                    <h4 id="email">Email Address</h4>
                    <div class="input-wrapper">
                        <i class="fa fa-envelope"></i>
                        <input class="email" type="text" placeholder="Enter your Email">
                    </div>
                </div>
                <div class="passwordSection">
                    <h4 class="password">Password</h4>
                    <div class="password-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input id="password" type="password" placeholder="Enter your password">
                    </div>
                </div>
                <div class="signSection">
                    <button class="register">Sign In</button>
                    <h3 class="nextPage">Do you have an account? <a href="index.html"> Sign in</a> </h3>
                </div>
            </div>
        </div>
    </div>
    <script src="register.js"></script>
</body>

</html>
