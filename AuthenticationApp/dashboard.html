<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Faster+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="icon" href="appLogo.png">
    <script
      type="text/javascript"
      src="https://www.gstatic.com/charts/loader.js"
    ></script>
    <script type="text/javascript">
      google.charts.load("current", { packages: ["corechart"] });
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ["days", "login"],
          ["1", 3],
          ["5", 4],
          ["10", 7],
          ["15", 6],
          ["20", 9],
          ["25", 12],
          ["30", 5],
        ]);

        var options = {
          title: "Security Performance",

          curveType: "function",

          legend: { position: "none" },

          colors: ["#7B2CBF"],

          backgroundColor: "transparent",

          areaOpacity: 0.25,

          chartArea: {
            left: 20,
            top: 40,
            width: "90%",
            height: "30%",
          },
          hAxis: {
            textPosition: "none",
            gridlines: { color: "transparent" },
          },

          vAxis: {
            textPosition: "none",
            gridlines: { color: "transparent" },
          },
        };

        var chart = new google.visualization.LineChart(
          document.getElementById("curve_chart"),
        );

        chart.draw(data, options);
      }
    </script>
  </head>

  <body>
    <div class="mainContainer">
      <div class="navSection">
        <div class="overview">
          <img class="img" src="profile.png" alt="" />
          <h1 id="WelcomeText">Welcome Back,</h1>
          <h1 id="username"></h1>
        </div>
        <div class="logout">
          <button class="logoutBtn">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out
          </button>
        </div>
      </div>
      <div class="dashboard">
        <div class="firstSec">
          <h2 id="overview">Overview</h2>
        </div>
        <div class="secondSec">
          <div class="box">
            <h2>Active Sessions</h2>
            <h2 class="loginCounts"></h2>
          </div>
          <div class="box">
            <h2>Last password change</h2>
            <h2>0</h2>
          </div>
          <div class="box" id="lastbox">
            <div class="textpart">
              <h2>Security Status</h2>
              <h2>ON</h2>
            </div>
            <div class="form-check form-switch">
              <input
                class="form-check-input toggle"
                type="checkbox"
                role="switch"
                id="switchCheckDefault"
              />
              <label class="form-check-label" for="switchCheckDefault"></label>
            </div>
          </div>
        </div>
        <div class="thirdSec">
          <div class="firstarea">
            <h1 class="firstHeading">Login Activity (last 30 days)</h1>
            <div id="curve_chart" style="width: 900px; height: 500px"></div>
          </div>
          <div class="secondarea">
            <h1 class="secondHeading">Security Actions</h1>
            <div class="startSec">
              <button class="securityBtn" id="changePassword">
                Change password
              </button>
              <button class="securityBtn">Setup 2FA</button>
            </div>
            <div class="lastSec">
              <i class="fa-solid fa-circle-check tick"></i>
              <h3 class="lastHeading">
                Your Account is Secured.Do not forget to update password
              </h3>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="dashboard.js"></script>
  </body>
</html>
